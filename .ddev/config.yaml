name: medical-on-the-moon
type: laravel
php_version: "8.4"
database:
  type: mariadb
  version: "10.11"
webserver_type: nginx-fpm
docroot: public
nodejs_version: "22"
web_environment:
  - SCOLTA_PRESET=reference
hooks:
  post-start:
    - exec: composer install --no-interaction --prefer-dist 2>&1 | tail -5
    - exec: npm install --silent 2>&1 | tail -3
    - exec: npm run build 2>&1 | tail -5
    - exec-host: ddev import-db --file=db/dump.sql.gz 2>/dev/null || true
    - exec: php artisan migrate --force --no-interaction 2>&1 | tail -5
    - exec: php artisan config:clear && php artisan cache:clear 2>&1
